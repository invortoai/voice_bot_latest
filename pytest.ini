[pytest]
asyncio_mode = auto
pythonpath = .
testpaths = tests
addopts =
    --tb=short
    --strict-markers
markers =
    slow: marks tests as slow load tests (deselect with '-m "not slow"')

[pytest:env]
ENVIRONMENT=local
WORKER_POOL_TYPE=local
WORKER_HOSTS=localhost:8765
API_KEY=
ENABLE_WORKER_PREWARM=false
DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy
PUBLIC_WS_URL=ws://localhost:8765
OPENAI_API_KEY=sk-test-dummy
DEEPGRAM_API_KEY=test-deepgram-dummy
ELEVENLABS_API_KEY=test-elevenlabs-dummy
LANGFUSE_TRACING_ENABLED=false
AWS_REGION=us-east-1
